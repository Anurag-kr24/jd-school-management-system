<!DOCTYPE html>
<html>
<head>
  <title>Fees</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<h2 class="mb-3">Fees</h2>

<div class="card p-3 mb-4 shadow">
  <input id="id" class="form-control mb-2" placeholder="Student ID">
  <input id="amt" class="form-control mb-2" placeholder="Amount">

  <select id="status" class="form-control mb-2">
    <option>Paid</option>
    <option>Pending</option>
  </select>

  <button class="btn btn-success" onclick="add()">Save Fee</button>
</div>

<table class="table table-bordered bg-white shadow">
  <thead class="table-dark">
    <tr>
      <th>#</th>
      <th>Student ID</th>
      <th>Amount</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="list"></tbody>
</table>

</div>

<script>

async function add(){
  const idVal = document.getElementById("id").value.trim();
  const amtVal = document.getElementById("amt").value.trim();
  const statusVal = document.getElementById("status").value;

  if(idVal === "" || amtVal === ""){
    alert("Fill all fields");
    return;
  }

  await fetch("http://localhost:5100/fees/add",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      studentId:idVal,
      amount:Number(amtVal),
      status:statusVal
    })
  });

  document.getElementById("id").value="";
  document.getElementById("amt").value="";

  load();
}

async function load(){
  const res = await fetch("http://localhost:5100/fees/all");
  const data = await res.json();

  list.innerHTML="";

  data.forEach((f,i)=>{
    list.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${f.studentId}</td>
        <td>${f.amount}</td>
        <td>${f.status}</td>
      </tr>
    `;
  });
}

load();

</script>

</body>
</html>
