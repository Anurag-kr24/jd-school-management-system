<!DOCTYPE html>
<html>
<head>
  <title>Attendance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<h2>Attendance</h2>

<div class="card p-3 shadow">

  <input id="id" class="form-control mb-2" placeholder="Student ID">

  <select id="status" class="form-control mb-2">
    <option>Present</option>
    <option>Absent</option>
  </select>

  <button class="btn btn-warning" onclick="mark()">Mark Attendance</button>

</div>

</div>

<script>
async function mark(){
  await fetch("http://localhost:5100/attendance/mark",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      studentId:id.value,
      status:status.value,
      date:new Date().toISOString()
    })
  });

  alert("Attendance Marked");
}
</script>

</body>
</html>
