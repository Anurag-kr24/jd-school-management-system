<!DOCTYPE html>
<html>
<head>
  <title>Marks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<h2 class="mb-3">Marks</h2>

<div class="card p-3 mb-4 shadow">
  <input id="id" class="form-control mb-2" placeholder="Student ID">
  <input id="sub" class="form-control mb-2" placeholder="Subject">
  <input id="marks" class="form-control mb-2" placeholder="Marks">
  <button class="btn btn-primary" onclick="add()">Add Marks</button>
</div>

<table class="table table-bordered bg-white shadow">
  <thead class="table-dark">
    <tr>
      <th>#</th>
      <th>Student ID</th>
      <th>Subject</th>
      <th>Marks</th>
    </tr>
  </thead>
  <tbody id="list"></tbody>
</table>

</div>

<script>

async function add(){
  const idVal = document.getElementById("id").value.trim();
  const subVal = document.getElementById("sub").value.trim();
  const marksVal = document.getElementById("marks").value.trim();

  if(idVal === "" || subVal === "" || marksVal === ""){
    alert("Fill all fields");
    return;
  }

  await fetch("http://localhost:5100/marks/add",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      studentId:idVal,
      subject:subVal,
      marks:Number(marksVal)
    })
  });

  document.getElementById("id").value="";
  document.getElementById("sub").value="";
  document.getElementById("marks").value="";

  load();
}

async function load(){
  const res = await fetch("http://localhost:5100/marks/all");
  const data = await res.json();

  list.innerHTML="";

  data.forEach((m,i)=>{
    list.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${m.studentId}</td>
        <td>${m.subject}</td>
        <td>${m.marks}</td>
      </tr>
    `;
  });
}

load();

</script>

</body>
</html>
