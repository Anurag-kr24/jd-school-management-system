<!DOCTYPE html>
<html>
<head>
  <title>Teachers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

  <h2 class="mb-3">Teachers</h2>

  <!-- Add Teacher -->
  <div class="card p-3 mb-4 shadow">
    <input id="name" class="form-control mb-2" placeholder="Enter Teacher Name">
    <input id="sub" class="form-control mb-2" placeholder="Enter Subject">
    <button class="btn btn-success" onclick="add()">Add Teacher</button>
  </div>

  <!-- Table -->
  <table class="table table-bordered table-hover bg-white shadow">
    <thead class="table-dark">
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Subject</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>

</div>

<script>

// ✅ ADD TEACHER
async function add(){
  const nameVal = document.getElementById("name").value.trim();
  const subVal = document.getElementById("sub").value.trim();

  if(nameVal === "" || subVal === ""){
    alert("Please fill all fields");
    return;
  }

  await fetch("http://localhost:5100/jd_teachers_api/add",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name: nameVal,
      subject: subVal
    })
  });

  document.getElementById("name").value = "";
  document.getElementById("sub").value = "";

  load();
}

// ✅ LOAD TEACHERS
async function load(){
  const res = await fetch("http://localhost:5100/jd_teachers_api/all");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((t, index)=>{
    const name = t.name ? t.name : "No Name";
    const subject = t.subject ? t.subject : "No Subject";

    list.innerHTML += `
      <tr>
        <td>${index + 1}</td>
        <td>${name}</td>
        <td>${subject}</td>
        <td>
          <button class="btn btn-sm btn-warning" onclick="edit('${t._id}', '${name}', '${subject}')">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="del('${t._id}')">Delete</button>
        </td>
      </tr>
    `;
  });
}

// ✅ DELETE
async function del(id){
  await fetch(`http://localhost:5100/jd_teachers_api/delete/${id}`,{
    method:"DELETE"
  });
  load();
}

// ✅ EDIT
function edit(id, oldName, oldSub){
  const newName = prompt("Enter new name:", oldName);
  const newSub = prompt("Enter new subject:", oldSub);

  if(!newName || !newSub){
    alert("Invalid input");
    return;
  }

  fetch(`http://localhost:5100/jd_teachers_api/update/${id}`,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name: newName,
      subject: newSub
    })
  }).then(load);
}

// initial load
load();

</script>

</body>
</html>
